<!DOCTYPE html>
<html lang="en-GB" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digitelos - IT Service Management &amp; Web Consultancy, Devon</title>
  <meta name="description" content="Digitelos - fractional IT service management consultancy and website services for charities and small organisations in Devon.">

  <link rel="icon" href="favicon.ico" sizes="48x48">
  <link rel="icon" type="image/svg+xml" href="assets/graphics/logo/Digitelos-B-appicon.svg">
  <link rel="apple-touch-icon" href="assets/graphics/favicon/apple-touch-icon-180.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#FBFAF6">

  <meta property="og:title" content="Digitelos - Digital consultancy that starts with the right question.">
  <meta property="og:description" content="IT service management consultancy and web services for charities and small organisations in Devon.">
  <meta property="og:image" content="https://digitelos.co.uk/assets/graphics/og-image.png">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap">
  <link rel="stylesheet" href="css/main.css">

  <script>
    // Apply saved theme before first paint to avoid a flash of the wrong theme.
    try {
      var t = localStorage.getItem('digitelos-theme');
      if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
    } catch (e) {}
  </script>
</head>
<body>

  <header class="site-header">
    <a class="brand" href="/">
      <img src="assets/graphics/logo/Digitelos-B-icon.svg" alt="Digitelos" width="44" height="44">
      <span class="brand-name">Digitelos</span>
    </a>
    <nav class="site-nav" aria-label="Main">
      <a href="#services">Services</a>
      <a href="#work">Work</a>
      <a href="#about">About</a>
      <a href="#contact" class="nav-cta">Contact</a>
      <button class="theme-toggle" type="button" aria-label="Switch to dark theme" aria-pressed="false">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
      </button>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Placeholder - hero to be designed</h1>
      <p>Starter scaffold. Design pass to follow.</p>
    </section>

    <section id="services"><h2>Services</h2></section>
    <section id="work"><h2>Work</h2></section>
    <section id="about"><h2>About</h2></section>
    <section id="contact"><h2>Contact</h2></section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Digitelos &middot; Devon, UK</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
